<svg viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Stacked Credit Cards Logo -->
  <g transform="translate(40, -10)">
    <!-- Back Card (Most rotated: -15deg) -->
    <rect x="230" y="240" width="580" height="380" rx="42" fill="#0f2f6e" transform="rotate(-15, 520, 430)" />

    <!-- Middle Card (Moderately rotated: -7.5deg) -->
    <rect x="240" y="260" width="580" height="380" rx="42" fill="#1a4aa8" transform="rotate(-7.5, 530, 450)" />

    <!-- Front Card (Perfect overlay/slight rotation or straight) -->
    <g transform="translate(10, 20)">
      <!-- Golden-bordered Navy front card -->
      <rect x="310" y="350" width="580" height="385" rx="42" fill="#0d2f6e" stroke="#e6a100" stroke-width="12" />

      <!-- Chip (Gold card chip) -->
      <rect x="730" y="410" width="100" height="72" rx="14" fill="#e6a100" />
      <line x1="730" y1="446" x2="830" y2="446" stroke="#0d2f6e" stroke-width="3" />
      <line x1="780" y1="410" x2="780" y2="482" stroke="#0d2f6e" stroke-width="3" />
      <rect x="748" y="423" width="64" height="46" rx="6" fill="none" stroke="#0d2f6e" stroke-width="3" />
      <line x1="730" y1="431" x2="748" y2="431" stroke="#0d2f6e" stroke-width="3" />
      <line x1="730" y1="461" x2="748" y2="461" stroke="#0d2f6e" stroke-width="3" />
      <line x1="812" y1="431" x2="830" y2="431" stroke="#0d2f6e" stroke-width="3" />
      <line x1="812" y1="461" x2="830" y2="461" stroke="#0d2f6e" stroke-width="3" />

      <!-- Serif Capital 'P' -->
      <text x="470" y="620" font-family="Georgia, 'Times New Roman', serif" font-size="220" font-weight="bold" fill="#e6a100" text-anchor="middle">P</text>
    </g>
  </g>
</svg>
